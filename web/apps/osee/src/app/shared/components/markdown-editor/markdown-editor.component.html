<div class="tw-flex">
	<div class="tw-flex tw-flex-1 tw-flex-row tw-gap-4 tw-p-4">
		<button
			mat-icon-button
			matTooltip="Undo"
			(click)="undo()">
			<div>
				<mat-icon> undo </mat-icon>
			</div>
		</button>
		<button
			mat-icon-button
			matTooltip="Redo"
			(click)="redo()">
			<div>
				<mat-icon> redo </mat-icon>
			</div>
		</button>
		<button
			mat-icon-button
			matTooltip="Examples"
			[matMenuTriggerFor]="mdExamplesMenu">
			<div>
				<mat-icon> lightbulb </mat-icon>
			</div>
		</button>
		<mat-menu #mdExamplesMenu="matMenu">
			@for (mdExample of mdExamples; track $index) {
				<button
					(click)="addExampleToMdContent(mdExample.markdown)"
					mat-menu-item>
					<div class="tw-flex tw-flex-row tw-items-center">
						<div class="tw-flex tw-items-center">
							<mat-icon> {{ mdExample.icon }} </mat-icon>
						</div>
						{{ mdExample.name }}
					</div>
				</button>
			}
		</mat-menu>
		<!-- Upload Image Button -->
		<span [matTooltip]="uploadImageTooltip()">
			<button
				mat-icon-button
				[disabled]="!canUploadImage() || isUploading()"
				[class.tw-opacity-40]="!canUploadImage() || isUploading()"
				(click)="openUploadImageDialog()">
				<div>
					@if (isUploading()) {
						<mat-icon> hourglass_empty </mat-icon>
					} @else {
						<mat-icon> image </mat-icon>
					}
				</div>
			</button>
		</span>
		<!-- Toggle Image Preview -->
		<button
			mat-icon-button
			[matTooltip]="
				showImages() ? 'Return to editing.' : 'Preview With Images'
			"
			[disabled]="isLoadingImages()"
			(click)="toggleShowImages()">
			<div>
				@if (isLoadingImages()) {
					<mat-icon> hourglass_empty </mat-icon>
				} @else if (showImages()) {
					<mat-icon> edit </mat-icon>
				} @else {
					<mat-icon> visibility </mat-icon>
				}
			</div>
		</button>
	</div>
</div>
<!-- Editor -->
<div
	class="tw-relative tw-flex tw-size-full tw-border tw-border-solid"
	[class.tw-border-2]="dragActive()"
	[class.tw-border-dashed]="dragActive()"
	[class.tw-border-osee-blue-6]="dragActive()"
	(dragover)="onEditorDragOver($event)"
	(dragenter)="onEditorDragEnter($event)"
	(dragleave)="onEditorDragLeave($event)"
	(drop)="onEditorDrop($event)">
	@if (dragActive()) {
		<div
			class="tw-pointer-events-none tw-absolute tw-inset-0 tw-z-10 tw-flex tw-flex-col tw-items-center tw-justify-center tw-gap-2 tw-bg-blue-50/90 dark:tw-bg-osee-neutral-6/90">
			<mat-icon
				class="tw-h-12 tw-w-12 tw-text-5xl tw-leading-[48px] tw-text-osee-blue-6"
				>cloud_upload</mat-icon
			>
			<span class="tw-text-lg tw-font-medium tw-text-osee-blue-6">
				Drop Image Here
			</span>
		</div>
	}
	<!-- Markdown Editor -->
	<mat-form-field
		ngPreserveWhitespaces
		class="tw-flex-1 [&>.mdc-text-field--filled]:tw-bg-inherit [&>.mdc-text-field--filled]:tw-text-inherit"
		subscriptSizing="dynamic"
		[matTooltip]="
			showImages() ? 'Click the edit icon to return to editing.' : ''
		"
		matTooltipShowDelay="300">
		<textarea
			type="text"
			matInput
			cdkTextareaAutosize
			[(ngModel)]="mdContent"
			[disabled]="isEditorDisabled()"
			placeholder="Start typing Markdown text..."
			class="placeholder:tw-font-mat-bold placeholder:tw-opacity-50"
			ngPreserveWhitespaces></textarea>
	</mat-form-field>

	<!-- Divider -->
	<mat-divider vertical></mat-divider>
	<!-- HTML (Markdown Preview) -->
	@if (showImages()) {
		<div
			class="tw-flex-1 tw-overflow-auto tw-p-4"
			[innerHtml]="imagePreviewHtml()"></div>
	} @else {
		<div
			class="tw-flex-1 tw-overflow-auto tw-p-4"
			[innerHtml]="mdPreview()"></div>
	}
</div>
