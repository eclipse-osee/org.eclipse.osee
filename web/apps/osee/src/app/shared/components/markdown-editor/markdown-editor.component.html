<div
	#fullscreenWrapper
	class="tw-flex tw-min-w-0 tw-flex-1 tw-flex-col"
	[class.tw-h-full]="isFullscreen()"
	[class.tw-bg-white]="isFullscreen()"
	[class.dark:tw-bg-osee-neutral-6]="isFullscreen()">
	<div
		class="tw-flex tw-shrink-0 tw-flex-wrap tw-items-center tw-gap-1 tw-px-4 tw-py-1"
		role="toolbar"
		aria-label="Markdown editor toolbar"
		oseeHelpAnchor="md-editor-toolbar">
		<button
			mat-icon-button
			matTooltip="Undo"
			[disabled]="!canUndo()"
			[class.tw-opacity-40]="!canUndo()"
			(click)="undo()">
			<div>
				<mat-icon> undo </mat-icon>
			</div>
		</button>
		<button
			mat-icon-button
			matTooltip="Redo"
			[disabled]="!canRedo()"
			[class.tw-opacity-40]="!canRedo()"
			(click)="redo()">
			<div>
				<mat-icon> redo </mat-icon>
			</div>
		</button>

		<span
			[matTooltip]="
				isEditorDisabled()
					? 'Exit image preview to use formatting.'
					: 'Insert Formatting'
			">
			<button
				mat-icon-button
				[disabled]="isEditorDisabled()"
				[class.tw-opacity-40]="isEditorDisabled()"
				(click)="toggleFormattingPanel()">
				<div>
					<mat-icon>
						{{ showFormattingPanel() ? 'expand_less' : 'text_format' }}
					</mat-icon>
				</div>
			</button>
		</span>

		<span [matTooltip]="uploadImageTooltip()">
			<button
				mat-icon-button
				oseeHelpAnchor="md-editor-image-btn"
				[disabled]="!canUploadImage() || isUploading()"
				[class.tw-opacity-40]="!canUploadImage() || isUploading()"
				(click)="openUploadImageDialog()">
				<div>
					@if (isUploading()) {
						<mat-icon> hourglass_empty </mat-icon>
					} @else {
						<mat-icon> image </mat-icon>
					}
				</div>
			</button>
		</span>

		<span [matTooltip]="tableButtonTooltip()">
			<button
				mat-icon-button
				oseeHelpAnchor="md-editor-table-btn"
				[disabled]="disabled() || showImages()"
				[class.tw-opacity-40]="disabled() || showImages()"
				(click)="openTableDialog()">
				<div>
					<mat-icon> table_chart </mat-icon>
				</div>
			</button>
		</span>

		<span [matTooltip]="selectTableTooltip()">
			<button
				mat-icon-button
				[disabled]="disabled() || showImages()"
				[class.tw-opacity-40]="disabled() || showImages()"
				(click)="selectTableAtCursor()">
				<div>
					<mat-icon> select_all </mat-icon>
				</div>
			</button>
		</span>

		<button
			mat-icon-button
			[matTooltip]="
				showImages() ? 'Return to editing.' : 'Preview With Images'
			"
			[disabled]="isLoadingImages()"
			(click)="toggleShowImages()">
			<div>
				@if (isLoadingImages()) {
					<mat-icon> hourglass_empty </mat-icon>
				} @else if (showImages()) {
					<mat-icon class="tw-text-primary"> edit </mat-icon>
				} @else {
					<mat-icon> visibility </mat-icon>
				}
			</div>
		</button>

		<button
			mat-icon-button
			[matTooltip]="
				isPreviewCollapsed()
					? 'Show Preview Panel'
					: 'Hide Preview Panel'
			"
			(click)="togglePreviewCollapsed()">
			<div>
				@if (isPreviewCollapsed()) {
					<mat-icon> vertical_split </mat-icon>
				} @else {
					<mat-icon> view_sidebar </mat-icon>
				}
			</div>
		</button>

		<button
			mat-icon-button
			oseeHelpAnchor="md-editor-fullscreen-btn"
			[matTooltip]="isFullscreen() ? 'Exit Fullscreen' : 'Fullscreen'"
			(click)="toggleFullscreen()">
			<div>
				@if (isFullscreen()) {
					<mat-icon> fullscreen_exit </mat-icon>
				} @else {
					<mat-icon> fullscreen </mat-icon>
				}
			</div>
		</button>

		<osee-help-button
			topicId="markdown-editor"
			class="tw-relative -tw-top-0.5"></osee-help-button>
	</div>

	@if (showFormattingPanel()) {
		<div
			class="tw-mx-4 tw-flex tw-flex-wrap tw-items-center tw-gap-1 tw-rounded tw-border tw-border-osee-neutral-25 tw-bg-white tw-px-3 tw-py-2 tw-shadow-sm dark:tw-border-osee-neutral-100 dark:tw-bg-osee-neutral-6"
			role="toolbar"
			aria-label="Formatting options">
			@for (action of formattingActions; track action.name) {
				<button
					mat-icon-button
					class="!tw-h-9 !tw-w-9"
					[matTooltip]="action.name"
					(click)="applyFormattingAndClose(action)">
					<div>
						<mat-icon class="!tw-text-[20px] !tw-leading-5">
							{{ action.icon }}
						</mat-icon>
					</div>
				</button>
			}
		</div>
	}

	<div
		#editorContainer
		data-testid="editor-container"
		class="tw-relative tw-flex tw-min-h-0 tw-overflow-hidden tw-border-osee-neutral-25 dark:tw-border-osee-neutral-100"
		[class.tw-flex-1]="isFullscreen()"
		[class.tw-border]="!dragActive()"
		[class.tw-border-2]="dragActive()"
		[class.tw-border-dashed]="dragActive()"
		[class.tw-border-osee-blue-6]="dragActive()"
		[style.height]="isFullscreen() ? null : height()"
		(dragover)="onEditorDragOver($event)"
		(dragenter)="onEditorDragEnter($event)"
		(dragleave)="onEditorDragLeave($event)"
		(drop)="onEditorDrop($event)">
		@if (dragActive()) {
			<div
				class="tw-absolute tw-inset-0 tw-z-10 tw-flex tw-flex-col tw-items-center tw-justify-center tw-gap-2 tw-bg-white/90 dark:tw-bg-osee-neutral-6/90">
				<mat-icon
					class="tw-size-12 tw-text-5xl tw-leading-[48px] tw-text-osee-blue-6">
					cloud_upload
				</mat-icon>
				<span class="tw-text-lg tw-font-medium tw-text-osee-blue-6">
					Drop Image Here
				</span>
			</div>
		}

		<div
			data-testid="editor-pane"
			oseeHelpAnchor="md-editor-textarea"
			class="tw-flex tw-min-h-0 tw-min-w-0 tw-flex-col tw-overflow-hidden"
			[class.tw-flex-1]="isPreviewCollapsed()"
			[class.tw--mr-px]="!isPreviewCollapsed()"
			[class.tw-opacity-40]="showImages()"
			[style.width.%]="isPreviewCollapsed() ? null : editorWidthPercent()"
			[style.flex-shrink]="isPreviewCollapsed() ? null : 0">
			<textarea
				#editorTextarea
				class="tw-size-full tw-min-h-0 tw-flex-1 tw-resize-none tw-overflow-y-auto tw-border-none tw-bg-transparent tw-p-4 tw-pr-2 tw-outline-none placeholder:tw-font-mat-bold placeholder:tw-opacity-50"
				[class.tw-ring-2]="keyboardFocused()"
				[class.tw-ring-inset]="keyboardFocused()"
				[class.tw-ring-osee-blue-6]="keyboardFocused()"
				[(ngModel)]="mdContent"
				[disabled]="isEditorDisabled()"
				[attr.aria-disabled]="isEditorDisabled()"
				[matTooltip]="
					showImages()
						? 'Click the edit icon to return to editing.'
						: ''
				"
				matTooltipShowDelay="300"
				aria-label="Markdown content editor"
				placeholder="Start typing Markdown text..."
				ngPreserveWhitespaces></textarea>
		</div>

		@if (!isPreviewCollapsed()) {
			<div
				role="separator"
				aria-orientation="vertical"
				aria-label="Resize editor and preview panels"
				[attr.aria-valuenow]="editorWidthPercent()"
				aria-valuemin="20"
				aria-valuemax="80"
				tabindex="0"
				class="tw-group tw-flex tw-w-2 tw-cursor-col-resize tw-items-center tw-justify-center tw-bg-transparent tw-transition-colors tw-delay-150 tw-duration-300 hover:tw-bg-osee-neutral-25/50 active:tw-bg-osee-blue-6/20 dark:hover:tw-bg-osee-neutral-100/20 dark:active:tw-bg-osee-blue-6/30"
				(mousedown)="onDividerMouseDown($event)"
				matTooltip="Drag To Resize">
				<div
					class="tw-h-full tw-w-px tw-bg-osee-neutral-25/50 tw-transition-opacity tw-delay-150 tw-duration-300 group-hover:tw-opacity-0 dark:tw-bg-osee-neutral-100/20"></div>
			</div>

			@if (showImages()) {
				<div
					class="tw-h-full tw-min-h-0 tw-min-w-0 tw-flex-1 tw-overflow-auto tw-p-4"
					role="region"
					aria-label="Markdown preview with images"
					oseeHelpAnchor="md-editor-preview"
					[innerHtml]="imagePreviewHtml()"></div>
			} @else {
				<div
					class="tw-h-full tw-min-h-0 tw-min-w-0 tw-flex-1 tw-overflow-auto tw-p-4"
					role="region"
					aria-label="Markdown preview"
					oseeHelpAnchor="md-editor-preview"
					[innerHtml]="mdPreview()"></div>
			}
		}
	</div>
</div>
