<mat-button-toggle-group
	[value]="branchType"
	(change)="selectType($event)"
	hideSingleSelectionIndicator
	class="tw-w-full"
	aria-label="Branch type">
	<mat-button-toggle
		value="baseline"
		data-cy="baseline"
		class="tw-flex-1">
		Baseline
	</mat-button-toggle>
	<mat-button-toggle
		value="working"
		data-cy="working"
		class="tw-flex-1">
		Working
	</mat-button-toggle>
</mat-button-toggle-group>
