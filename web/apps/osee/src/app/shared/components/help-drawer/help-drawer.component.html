<div
	class="tw-flex tw-h-full tw-w-[420px] tw-flex-col tw-overflow-hidden tw-rounded-lg tw-border tw-border-osee-neutral-25 tw-bg-white tw-shadow-2xl dark:tw-border-osee-neutral-100 dark:tw-bg-[#1e1e22]"
	role="complementary"
	aria-label="Help panel">
	<!-- Header -->
	<div
		class="tw-flex tw-items-center tw-justify-between tw-border-b tw-border-osee-neutral-25 tw-bg-osee-neutral-190 tw-px-4 tw-py-2 dark:tw-border-osee-neutral-100 dark:tw-bg-[#2a2a2e]">
		<div class="tw-flex tw-items-center tw-gap-2">
			<mat-icon class="tw-text-osee-blue-6">help_outline</mat-icon>
			<h2 class="tw-m-0 tw-text-base tw-font-medium">
				{{ topicLabel() }}
			</h2>
		</div>
		<button
			mat-icon-button
			(click)="close()"
			matTooltip="Close Help">
			<mat-icon>close</mat-icon>
		</button>
	</div>

	<!-- Section navigation with highlight + scroll buttons -->
	@if (sections().length > 0) {
		<nav
			class="tw-border-b tw-border-osee-neutral-25 tw-px-3 tw-py-2 dark:tw-border-osee-neutral-100"
			aria-label="Help sections">
			<ul class="tw-m-0 tw-flex tw-list-none tw-flex-wrap tw-gap-1 tw-p-0">
				@for (section of sections(); track section.id) {
					<li class="tw-flex tw-items-center">
						<button
							class="tw-flex tw-cursor-pointer tw-items-center tw-gap-1 tw-rounded-full tw-border tw-px-2.5 tw-py-1 tw-text-xs tw-font-medium tw-transition-colors"
							[class.tw-border-osee-blue-6]="activeSection() === section.id"
							[class.tw-bg-osee-blue-6]="activeSection() === section.id"
							[class.tw-text-white]="activeSection() === section.id"
							[class.tw-border-osee-neutral-25]="activeSection() !== section.id"
							[class.dark:tw-border-osee-neutral-100]="activeSection() !== section.id"
							[class.tw-bg-transparent]="activeSection() !== section.id"
							[class.tw-text-osee-neutral-60]="activeSection() !== section.id"
							[class.dark:tw-text-osee-neutral-140]="activeSection() !== section.id"
							[class.hover:tw-bg-osee-blue-6]="activeSection() !== section.id"
							[class.hover:tw-text-white]="activeSection() !== section.id"
							[class.hover:tw-border-osee-blue-6]="activeSection() !== section.id"
							(click)="highlightAndScroll(section)"
							[matTooltip]="'Highlight in UI and scroll to docs'">
							<mat-icon class="!tw-size-4 !tw-text-[14px] !tw-leading-4">visibility</mat-icon>
							{{ section.label }}
						</button>
					</li>
				}
			</ul>
		</nav>
	}

	<!-- Markdown content area -->
	<div
		#contentArea
		class="tw-flex-1 tw-overflow-y-auto tw-px-4 tw-py-3"
		(scroll)="$event">
		@if (markdownPath()) {
			<markdown
				[src]="markdownPath()"
				[disableSanitizer]="true"
				(ready)="onMarkdownReady()"
				class="osee-help-markdown"></markdown>
		} @else {
			<p class="tw-text-sm tw-opacity-60">
				No help content available for this topic.
			</p>
		}
	</div>
</div>
