<div class="osee-help-popup-root tw-flex tw-h-full tw-flex-col tw-overflow-hidden">
	<!-- Header -->
	<div
		class="osee-help-popup-header tw-flex tw-items-center tw-justify-between tw-border-b tw-px-4 tw-py-2">
		<div class="tw-flex tw-items-center tw-gap-2">
			<mat-icon>help_outline</mat-icon>
			<h1 class="tw-m-0 tw-text-base tw-font-medium">
				{{ topicLabel() }}
			</h1>
		</div>
	</div>

	<!-- Section navigation -->
	@if (sections().length > 0) {
		<nav
			class="osee-help-popup-nav tw-border-b tw-px-3 tw-py-2"
			aria-label="Help sections">
			<ul class="tw-m-0 tw-flex tw-list-none tw-flex-wrap tw-gap-1 tw-p-0">
				@for (section of sections(); track section.id) {
					<li class="tw-flex tw-items-center">
						<button
							class="osee-help-section-chip tw-flex tw-cursor-pointer tw-items-center tw-gap-1 tw-rounded-full tw-border tw-px-2.5 tw-py-1 tw-text-xs tw-font-medium tw-transition-colors"
							[class.active]="activeSection() === section.id"
							(click)="highlightInParent(section)"
							[matTooltip]="'Highlight in UI and scroll to docs.'">
							<mat-icon class="!tw-size-4 !tw-text-[14px] !tw-leading-4">visibility</mat-icon>
							{{ section.label }}
						</button>
					</li>
				}
			</ul>
		</nav>
	}

	<!-- Markdown content area -->
	<div
		#contentArea
		class="tw-flex-1 tw-overflow-y-auto tw-px-4 tw-py-3">
		@if (markdownPath()) {
			<markdown
				[src]="markdownPath()"
				[disableSanitizer]="true"
				(ready)="onMarkdownReady()"
				class="osee-help-markdown"></markdown>
		} @else {
			<p class="tw-text-sm tw-opacity-60">
				No help content available for this topic.
			</p>
		}
	</div>
</div>
