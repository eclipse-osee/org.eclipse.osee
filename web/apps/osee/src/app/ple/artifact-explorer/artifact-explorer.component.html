<div
	class="tw-flex tw-h-full tw-overflow-hidden"
	cdkDropListGroup
	#layoutContainer>
	<!-- Activity bar (vertical icon strip, like VS Code) -->
	<div
		class="tw-flex tw-h-full tw-w-12 tw-shrink-0 tw-flex-col tw-items-center tw-gap-1 tw-border-r tw-border-solid tw-border-r-background-hover tw-pt-2">
		<button
			mat-icon-button
			(click)="toggleSection('hierarchy')"
			matTooltip="Artifact Hierarchy"
			aria-label="Artifact Hierarchy"
			[class]="
				!panelCollapsed() && activeSection() === 'hierarchy'
					? 'tw-text-primary'
					: 'tw-opacity-60'
			">
			<mat-icon>account_tree</mat-icon>
		</button>
		<button
			mat-icon-button
			(click)="toggleSection('search')"
			matTooltip="Artifact Search"
			aria-label="Artifact Search"
			[class]="
				!panelCollapsed() && activeSection() === 'search'
					? 'tw-text-primary'
					: 'tw-opacity-60'
			">
			<mat-icon>search</mat-icon>
		</button>
		<button
			mat-icon-button
			(click)="toggleSection('branch')"
			matTooltip="Branch Management"
			aria-label="Branch Management"
			[class]="
				!panelCollapsed() && activeSection() === 'branch'
					? 'tw-text-primary'
					: 'tw-opacity-60'
			">
			<mat-icon>merge_type</mat-icon>
		</button>
	</div>
	@if (!panelCollapsed()) {
		<!-- Hierarchy panel (resizable) -->
		<div
			class="tw-h-full tw-shrink-0 tw-overflow-hidden"
			[style.width.%]="panelWidthPercent()">
			<osee-artifact-hierarchy-panel
				class="tw-block tw-h-full"
				[activeSection]="activeSection()"
				(navigateToHierarchy)="activeSection.set('hierarchy')" />
		</div>
		<!-- Resize divider -->
		<div
			role="separator"
			aria-orientation="vertical"
			aria-label="Resize hierarchy and editor panels"
			[attr.aria-valuenow]="panelWidthPercent()"
			aria-valuemin="15"
			aria-valuemax="50"
			tabindex="0"
			class="tw-group tw-flex tw-h-full tw-w-2.5 tw-shrink-0 tw-cursor-col-resize tw-items-center tw-justify-center tw-bg-background-hover tw-transition-colors hover:tw-bg-primary-300 active:tw-bg-primary-500"
			(mousedown)="onDividerMouseDown($event)"
			(keydown)="onDividerKeyDown($event)"
			matTooltip="Drag To Resize">
			<div
				class="tw-h-8 tw-w-1 tw-rounded tw-bg-foreground-disabled"></div>
		</div>
	}
	<!-- Editor area -->
	<div class="tw-h-full tw-min-w-0 tw-flex-1 tw-overflow-hidden">
		<osee-artifact-tab-group />
	</div>
</div>
