<osee-artifact-dialog-title [operationType]="data.operationType" />
<mat-dialog-content>
	<p class="tw-text-sm">
		Are you sure you want to delete
		<span class="tw-font-medium tw-underline">{{ data.artifact.name }}</span>?
	</p>
</mat-dialog-content>
<div
	mat-dialog-actions
	align="end"
	class="tw-gap-2">
	<button
		mat-stroked-button
		class="tw-text-osee-red-8"
		(click)="onCancel()">
		Cancel
	</button>
	<button
		mat-stroked-button
		(click)="onSubmit()">
		Delete
	</button>
</div>
