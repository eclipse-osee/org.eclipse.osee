<div class="tw-grid tw-grid-cols-[max-content_1fr] tw-items-center tw-gap-y-2 tw-pr-4">
	<!--Native Content Editor (shown when artifact has native content)-->
	@if (nativeEditorAttrs(); as nativeAttrs) {
		<div class="tw-col-span-2 tw-px-4 tw-py-2">
			<osee-native-content-editor
				[nativeEditorAttributes]="nativeAttrs"
				[editable]="editable()"
				[branchId]="tab().branchId"
				[artifactId]="tab().artifact.id"
				[hasUnsavedChanges]="hasUnsavedNativeChanges()"
				[pendingName]="pendingNativeName()"
				[pendingExtension]="pendingNativeExtension()"
				(updatedAttributes)="handleNativeContentChanges($event)" />
			@if (hasUnsavedNativeChanges()) {
				<button
					mat-icon-button
					matTooltip="Save native content changes"
					(click)="saveNativeContent()">
					<mat-icon>save</mat-icon>
				</button>
			}
		</div>
	}
	<!--Name attribute (always first)-->
	@if (nameAttr(); as name) {
		<div class="tw-whitespace-nowrap tw-pl-4 tw-pr-4 tw-font-bold">
			Name:
		</div>
		<div>
			<osee-persisted-artifact-attribute-editor
				[attr]="name"
				[artifactId]="artifactId()"
				[artifactApplicability]="applicability()"
				[disabled]="!editable()" />
		</div>
	}
	<!--Applicability Dropdown-->
	@if (branchHasPleCategory()) {
		<div class="tw-whitespace-nowrap tw-pl-4 tw-pr-4 tw-font-bold">
			Applicability:
		</div>
		<div>
			<form oseeForm>
				<osee-persisted-applicability-dropdown
					[artifactId]="tab().artifact.id"
					[(applicability)]="tab().artifact.applicability"
					[disabled]="!editable()"
					[branchIdOverride]="tab().branchId" />
			</form>
		</div>
	}
	<!--Remaining attributes (auto-save on change)-->
	@for (attr of otherAttrs(); track attr.typeId) {
		<div class="tw-whitespace-nowrap tw-pl-4 tw-pr-4 tw-font-bold">
			{{ attr.name ?? '' }}:
		</div>
		<div>
			<osee-persisted-artifact-attribute-editor
				[attr]="attr"
				[artifactId]="artifactId()"
				[artifactApplicability]="applicability()"
				[disabled]="!editable()" />
		</div>
	}
</div>
