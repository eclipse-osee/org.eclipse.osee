<div class="tw-flex tw-h-full tw-flex-col">
	<!-- Branch picker (always visible) -->
	<div
		class="tw-relative tw-z-10 tw-shrink-0 tw-whitespace-nowrap tw-px-2 tw-py-1 tw-shadow-[0_2px_4px_-1px_rgba(0,0,0,0.2)] dark:tw-shadow-[0_4px_6px_-1px_rgba(0,0,0,0.4)] [&_.mdc-text-field--filled]:tw-bg-transparent [&_.mat-mdc-radio-button]:tw-whitespace-nowrap">
		<osee-branch-picker></osee-branch-picker>
		<div class="tw-flex tw-w-full tw-items-center tw-gap-2 tw-pt-1">
			@if (branchHasPleCategory()) {
				<osee-current-view-selector />
			}
		</div>
	</div>
	<!-- Active section content -->
	<div class="tw-min-h-0 tw-flex-1 tw-overflow-hidden tw-flex tw-flex-col">
		<div
			class="hierarchy-scroll tw-min-h-0 tw-flex-1 tw-overflow-auto"
			role="tree"
			aria-label="Artifact hierarchy"
			[class.tw-hidden]="activeSection() !== 'hierarchy'">
			@if (branchIdValid() && branchType()) {
				<div
					class="tw-pt-1"
					cdkDropList
					cdkDropListConnectedTo="relationList">
					@if (paths | async; as paths) {
						<osee-artifact-hierarchy
							[paths]="paths"
							artifactId="197818"></osee-artifact-hierarchy>
					} @else {
						<osee-artifact-hierarchy
							artifactId="197818"></osee-artifact-hierarchy>
					}
				</div>
			}
		</div>
		<osee-artifact-search
			class="tw-min-h-0 tw-flex-1"
			[class.tw-hidden]="activeSection() !== 'search'"
			(navigateToHierarchy)="navigateToHierarchy.emit()" />
		<div [class.tw-hidden]="activeSection() !== 'branch'">
			<osee-branch-management-panel />
		</div>
	</div>
</div>
