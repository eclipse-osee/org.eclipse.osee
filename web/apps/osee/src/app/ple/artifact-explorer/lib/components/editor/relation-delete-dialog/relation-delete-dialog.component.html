<h1
	mat-dialog-title>
	<div class="tw-flex tw-flex-row tw-items-center tw-gap-2">
		<mat-icon class="tw-text-osee-red-8">delete</mat-icon>
		Remove Relation?
	</div>
</h1>
<mat-dialog-content>
	<p class="tw-text-sm">
		Are you sure you want to remove the relation between
		<span class="tw-font-bold tw-text-osee-red-8">{{ data.sideAName }}</span>
		and
		<span class="tw-font-bold tw-text-osee-red-8">{{ data.sideBName }}</span>?
	</p>
</mat-dialog-content>
<div
	mat-dialog-actions
	align="end"
	class="tw-gap-2">
	<button
		mat-stroked-button
		class="tw-text-osee-red-8"
		mat-dialog-close="cancel"
		data-cy="cancel-btn">
		Cancel
	</button>
	<button
		mat-stroked-button
		mat-dialog-close="ok"
		data-cy="submit-btn">
		Remove
	</button>
</div>
