@let _value = value();
@if (hasChanges(_value)) {
	@if (_value.changes.value !== undefined) {
		<button
			mat-menu-item
			(click)="viewDiff(true, _value.changes.value, 'Value')">
			<mat-icon class="tw-text-osee-yellow-10 dark:tw-text-osee-amber-9"
				>pageview</mat-icon
			>View Diff for
			{{ _value.name }}
		</button>
	}
}
@if (!hasChanges(_value)) {
	No changes to view
}
