name: OSEE Build Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  ARTIFACT_PATH: "plugins/org.eclipse.osee.server.p2/target/org.eclipse.osee.server.runtime.zip"
  SERVER_PATH: "osee_server"
  SERVER_ZIP: "org.eclipse.osee.server.runtime.zip"
  IMAGE_DIRECTORY: ".github/docker/osee-server/Dockerfile"

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      angular_changed: ${{ steps.angular_changes.outputs.any_modified }}
      java_changed: ${{ steps.java_changes.outputs.any_modified }}
      rust_changed: ${{ steps.rust_changes.outputs.any_modified }}
      rules_osee_changed: ${{ steps.rules_osee_changes.outputs.any_modified }}
      postgres_schema_changed: ${{ steps.postgres_schema_changes.outputs.any_modified }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check For Angular Changes
        id: angular_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            web/**/*
            **/package.json
            pnpm-lock.yaml

      - name: Check For Java Changes
        id: java_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            plugins/**/*
            features/**/*
            .github/docker/osee-server/*

      - name: Check For Rust Changes
        id: rust_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.rs
            **/Cargo.toml
            Cargo.lock

      - name: Check For rules_osee Changes
        id: rules_osee_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            rules_osee/**/*
            rules_osee_examples/**/*
            WORKSPACE
            MODULE.bazel
            MODULE.bazel.lock
            BUILD
            **/.bazelrc
            **/.bazelversion

      - name: Check For postgres schema Changes
        id: postgres_schema_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            .github/docker/utility/osee-postgres/**/*

      - name: Show Outputs
        run: |
          echo "# Changed Files: " >> $GITHUB_STEP_SUMMARY
          echo "## Angular Changed: ${{ steps.angular_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Java Changed: ${{ steps.java_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Rust Changed: ${{ steps.rust_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Rules_Osee Changed: ${{ steps.rules_osee_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Postgres schema Changed: ${{ steps.postgres_schema_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY

  generate_potential_docker_ref:
    runs-on: ubuntu-latest
    needs: check_changes
    outputs:
      osee_server_latest_ref: ${{ steps.osee_server_latest_ref.outputs.osee_server_latest_ref }}
      osee_server_main_ref: ${{ steps.osee_server_main_ref.outputs.osee_server_main_ref }}
      osee_server_image_ref: ${{ steps.osee_server_image_ref.outputs.osee_server_image_ref}}
      osee_postgres_latest_ref: ${{ steps.osee_postgres_latest_ref.outputs.osee_postgres_latest_ref }}
      osee_postgres_main_ref: ${{ steps.osee_postgres_main_ref.outputs.osee_postgres_main_ref }}
      osee_postgres_image_ref: ${{ steps.osee_postgres_image_ref.outputs.osee_postgres_image_ref}}
      compose_file_ref: compose-file${{ steps.artifact_ref.outputs.artifact_current_ref }}
    steps:
      - uses: actions/checkout@v4

      - id: docker_ref
        uses: ./.github/actions/docker-current-ref

      - name: osee_server_main_ref
        id: osee_server_main_ref
        shell: bash
        run: echo "osee_server_main_ref=ghcr.io/${{ github.repository }}/osee-server:latest" >> "$GITHUB_OUTPUT"

      - name: osee_server_latest_ref
        id: osee_server_latest_ref
        shell: bash
        run: echo "osee_server_latest_ref=ghcr.io/${{ github.repository }}/osee-server${{steps.docker_ref.outputs.docker_current_ref}}:latest" >> "$GITHUB_OUTPUT"

      - id: osee_server_image_ref
        shell: bash
        run: |
          if [[ "${{needs.check_changes.outputs.java_changed}}" == "true" ]]; then
            echo "osee_server_image_ref=${{ steps.osee_server_latest_ref.outputs.osee_server_latest_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "osee_server_image_ref=${{ steps.osee_server_main_ref.outputs.osee_server_main_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: osee_postgres_main_ref
        id: osee_postgres_main_ref
        shell: bash
        run: echo "osee_postgres_main_ref=ghcr.io/${{ github.repository }}/osee-postgres:latest" >> "$GITHUB_OUTPUT"

      - name: osee_postgres_latest_ref
        id: osee_postgres_latest_ref
        shell: bash
        run: echo "osee_postgres_latest_ref=ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:latest" >> "$GITHUB_OUTPUT"

      - id: osee_postgres_image_ref
        shell: bash
        run: |
          if [[ "${{needs.check_changes.outputs.postgres_schema_changed}}" == "true" ]]; then
            echo "osee_postgres_image_ref=${{ steps.osee_postgres_latest_ref.outputs.osee_postgres_latest_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "osee_postgres_image_ref=${{ steps.osee_postgres_main_ref.outputs.osee_postgres_main_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: create artifact ref
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: setup environment files
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ steps.osee_postgres_image_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ steps.osee_server_image_ref.outputs.osee_server_image_ref }}"

      - name: upload compose
        uses: actions/upload-artifact@v4
        with:
          name: compose-file${{steps.artifact_ref.outputs.artifact_current_ref}}
          overwrite: true
          path: docker-compose.yml

  build_osee_postgres:
    runs-on: ubuntu-latest
    needs: [check_changes, generate_potential_docker_ref]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: create docker ref
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        id: docker_ref
        uses: ./.github/actions/docker-current-ref

      - name: Set Up Docker Buildx
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Get Current Timestamp
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        id: date
        run: echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build And Push Docker Image
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/utility/osee-postgres/Dockerfile
          build-args: |
            IMAGE_DIRECTORY=.github/docker/utility/osee-postgres
          push: "true"
          tags: |
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:${{ steps.date.outputs.timestamp }}
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:latest

  validate_osee_build_linux:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [check_changes, generate_potential_docker_ref, build_osee_postgres]
    container:
      image: ghcr.io/eclipse-osee/org.eclipse.osee/maven-node:20260210184531
    services:
      postgres:
        image: ${{ needs.check_changes.outputs.java_changed == 'true' && needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref || '' }}
        env:
          POSTGRES_PASSWORD: osee
          POSTGRES_USER: osee
          POSTGRES_DB: osee
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build OSEE Binaries
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/build-osee-binary
        with:
          SKIP_ANGULAR_TESTS: "true"
          ANGULAR_BUILD_TYPE: "forced_sso_java_release"

      - name: create artifact ref
        id: artifact_ref
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/artifact-current-ref

      - name: Archive Binaries
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: osee-server${{steps.artifact_ref.outputs.artifact_current_ref}}-binaries
          overwrite: true
          path: ${{ env.ARTIFACT_PATH }}

      - name: Archive Compiled Classes For SpotBugs
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: osee-compiled-classes${{steps.artifact_ref.outputs.artifact_current_ref}}
          overwrite: true
          retention-days: 1
          path: plugins/**/target/classes/**/*.class

  spotbugs_analysis:
    runs-on: ubuntu-latest
    needs: [validate_osee_build_linux, check_changes]
    if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
    container:
      image: ghcr.io/eclipse-osee/org.eclipse.osee/alpine-spotbugs:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: create artifact ref
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: Download Compiled Classes
        uses: actions/download-artifact@v4
        with:
          name: osee-compiled-classes${{steps.artifact_ref.outputs.artifact_current_ref}}
          path: compiled-classes

      - name: Run SpotBugs Analysis (Full)
        run: |
          /root/spotbugs/spotbugs-4.9.1/bin/spotbugs \
            -textui \
            -html:fancy-hist.xsl \
            -output spotbugs-report-full.html \
            -auxclasspathFromInput \
            -onlyAnalyze "org.eclipse.osee.-" \
            -nested:false \
            compiled-classes/

          /root/spotbugs/spotbugs-4.9.1/bin/spotbugs \
            -textui \
            -xml:withMessages \
            -output spotbugs-report-full.xml \
            -auxclasspathFromInput \
            -onlyAnalyze "org.eclipse.osee.-" \
            -nested:false \
            compiled-classes/

      - name: Get Changed Files and Run Scoped SpotBugs
        if: always()
        id: changed_analysis
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const files = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
                page: page,
              });
              if (data.length === 0) break;
              for (const f of data) files.push(f.filename);
              page++;
            }

            const classes = new Set();
            const classToRepo = new Map();
            for (const f of files) {
              if (!f.endsWith('.java')) continue;
              for (const marker of ['/src/', '/src-gen/']) {
                const idx = f.indexOf(marker);
                if (idx !== -1) {
                  const rel = f.substring(idx + marker.length);
                  const dotted = rel.replace(/\//g, '.').replace(/\.java$/, '');
                  classes.add(dotted);
                  classToRepo.set(f, rel);
                  break;
                }
              }
            }

            if (classes.size === 0) {
              core.info('No changed Java classes found, skipping scoped analysis.');
              core.setOutput('has_changed_classes', 'false');
              return;
            }

            const analyzeList = [...classes].join(',');
            core.info(`Running SpotBugs on ${classes.size} changed class(es): ${analyzeList}`);

            // Save the sourcepath-to-repo-path mapping for inline review comments
            const mapping = {};
            for (const [repoPath, srcRel] of classToRepo.entries()) {
              mapping[srcRel] = repoPath;
            }
            fs.writeFileSync('sourcepath-mapping.json', JSON.stringify(mapping));

            try {
              execSync(
                `/root/spotbugs/spotbugs-4.9.1/bin/spotbugs ` +
                `-textui -html:fancy-hist.xsl -output spotbugs-report-changed.html ` +
                `-auxclasspathFromInput -onlyAnalyze "${analyzeList}" ` +
                `-nested:false compiled-classes/`,
                { stdio: 'inherit' }
              );
              execSync(
                `/root/spotbugs/spotbugs-4.9.1/bin/spotbugs ` +
                `-textui -xml:withMessages -output spotbugs-report-changed.xml ` +
                `-auxclasspathFromInput -onlyAnalyze "${analyzeList}" ` +
                `-nested:false compiled-classes/`,
                { stdio: 'inherit' }
              );
            } catch (e) {
              core.warning(`Scoped SpotBugs analysis exited with code ${e.status}`);
            }

            core.setOutput('has_changed_classes', 'true');

      - name: Upload SpotBugs Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            spotbugs-report-full.html
            spotbugs-report-changed.html

      - name: Post SpotBugs Comment To PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- spotbugs-analysis-comment -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            function countBugsFromXml(file) {
              if (!fs.existsSync(file)) return -1;
              const xml = fs.readFileSync(file, 'utf8');
              const m = xml.match(/total_bugs="(\d+)"/);
              return m ? parseInt(m[1], 10) : 0;
            }

            function parseBugsFromXml(file) {
              if (!fs.existsSync(file)) return [];
              const xml = fs.readFileSync(file, 'utf8');
              const bugs = [];
              const bugRe = /<BugInstance[\s\S]*?<\/BugInstance>/g;
              let match;
              while ((match = bugRe.exec(xml)) !== null) {
                const block = match[0];

                const attr = (name) => {
                  const m = block.match(new RegExp(`${name}="([^"]*)"`));
                  return m ? m[1] : '';
                };

                const tagText = (tag) => {
                  const m = block.match(new RegExp(`<${tag}>([^<]*)</${tag}>`));
                  return m ? m[1] : '';
                };

                // Get category and priority from the BugInstance opening tag
                const opening = block.substring(0, block.indexOf('>') + 1);
                const category = opening.match(/category="([^"]*)"/)?.[1] || '';
                const priority = opening.match(/priority="([^"]*)"/)?.[1] || '';
                const type = opening.match(/type="([^"]*)"/)?.[1] || '';

                // Get source info from the first SourceLine element
                const slMatch = block.match(/<SourceLine[^>]*>/);
                const sl = slMatch ? slMatch[0] : '';
                const sourcepath = sl.match(/sourcepath="([^"]*)"/)?.[1] || '';
                const startLine = sl.match(/start="([^"]*)"/)?.[1] || '';

                const message = tagText('ShortMessage');
                const longMessage = tagText('LongMessage');

                const priorityLabel = { '1': 'High', '2': 'Medium', '3': 'Low' }[priority] || priority;

                bugs.push({ category, priority: priorityLabel, type, sourcepath, startLine, message, longMessage });
              }
              return bugs;
            }

            const fullCount = countBugsFromXml('spotbugs-report-full.xml');
            const changedCount = countBugsFromXml('spotbugs-report-changed.xml');
            const changedBugs = parseBugsFromXml('spotbugs-report-changed.xml');

            // Get the direct artifact download URL
            let artifactUrl = `${runUrl}#artifacts`;
            try {
              const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              const report = artifacts.find(a => a.name === 'spotbugs-report');
              if (report) {
                artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${report.id}`;
              }
            } catch (e) {
              core.warning(`Could not fetch artifact URL: ${e.message}`);
            }

            const lines = [marker, `## :mag: SpotBugs Analysis`, ``];

            // Changed files section with inline details
            if (changedBugs.length > 0) {
              lines.push(`### :pushpin: Issues in Changed Files — ${changedBugs.length} issue(s)`);
              lines.push(``);
              lines.push(`| File | Line | Priority | Category | Bug Type | Message |`);
              lines.push(`|------|------|----------|----------|----------|---------|`);
              for (const bug of changedBugs) {
                const file = bug.sourcepath ? `\`${bug.sourcepath}\`` : '';
                const line = bug.startLine || '';
                const msg = bug.message.replace(/\|/g, '\\|');
                lines.push(`| ${file} | ${line} | ${bug.priority} | ${bug.category} | ${bug.type} | ${msg} |`);
              }
              lines.push(``);
            } else if (changedCount === 0) {
              lines.push(`### :pushpin: Changed Files`);
              lines.push(`> :white_check_mark: No issues in files changed by this PR.`);
              lines.push(``);
            }

            // Full report section
            if (fullCount > 0) {
              lines.push(`### :file_folder: Full Analysis`);
              lines.push(`> :warning: **${fullCount}** total issue(s) across all \`org.eclipse.osee\` packages.`);
            } else if (fullCount === 0) {
              lines.push(`### :file_folder: Full Analysis`);
              lines.push(`> :white_check_mark: No issues found.`);
            } else {
              lines.push(`> :x: SpotBugs report was not generated.`);
            }

            lines.push(``);
            lines.push(`[:arrow_down: Download the SpotBugs HTML reports](${artifactUrl})`);

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post SpotBugs Inline Review Comments
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('spotbugs-report-changed.xml') || !fs.existsSync('sourcepath-mapping.json')) {
              core.info('No changed-files SpotBugs report or mapping found, skipping inline comments.');
              return;
            }

            const xml = fs.readFileSync('spotbugs-report-changed.xml', 'utf8');
            const sourceToRepo = JSON.parse(fs.readFileSync('sourcepath-mapping.json', 'utf8'));

            // Build sorted arrays of diff lines for each changed file
            const diffLineArrays = {};
            const prFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            for (const file of prFiles) {
              if (!file.patch) continue;
              const lines = new Set();
              const hunkRe = /^@@ -\d+(?:,\d+)? \+(\d+)(?:,(\d+))? @@/gm;
              let hunk;
              while ((hunk = hunkRe.exec(file.patch)) !== null) {
                const start = parseInt(hunk[1], 10);
                const count = hunk[2] !== undefined ? parseInt(hunk[2], 10) : 1;
                for (let i = start; i < start + count; i++) {
                  lines.add(i);
                }
              }
              diffLineArrays[file.filename] = [...lines].sort((a, b) => a - b);
            }

            // Find the nearest diff line to a target line
            function nearestDiffLine(sortedLines, target) {
              if (!sortedLines || sortedLines.length === 0) return null;
              let closest = sortedLines[0];
              let minDist = Math.abs(target - closest);
              for (const l of sortedLines) {
                const dist = Math.abs(target - l);
                if (dist < minDist) {
                  minDist = dist;
                  closest = l;
                }
                if (l > target) break;
              }
              return closest;
            }

            // Parse bugs
            const bugRe = /<BugInstance[\s\S]*?<\/BugInstance>/g;
            const comments = [];
            let match;

            while ((match = bugRe.exec(xml)) !== null) {
              const block = match[0];

              const opening = block.substring(0, block.indexOf('>') + 1);
              const type = opening.match(/type="([^"]*)"/)?.[1] || '';
              const priority = opening.match(/priority="([^"]*)"/)?.[1] || '';
              const category = opening.match(/category="([^"]*)"/)?.[1] || '';

              const slMatch = block.match(/<SourceLine[^>]*>/);
              const sl = slMatch ? slMatch[0] : '';
              const sourcepath = sl.match(/sourcepath="([^"]*)"/)?.[1] || '';
              const startLine = parseInt(sl.match(/start="([^"]*)"/)?.[1] || '0', 10);

              const shortMsg = block.match(/<ShortMessage>([^<]*)<\/ShortMessage>/)?.[1] || '';
              const longMsg = block.match(/<LongMessage>([^<]*)<\/LongMessage>/)?.[1] || '';

              if (!sourcepath) continue;

              const repoPath = sourceToRepo[sourcepath];
              if (!repoPath) continue;

              const priorityLabel = { '1': 'High', '2': 'Medium', '3': 'Low' }[priority] || priority;
              const docsUrl = `https://spotbugs.readthedocs.io/en/stable/bugDescriptions.html#${type.toLowerCase()}`;

              const fileDiffLines = diffLineArrays[repoPath];
              const isExactLine = startLine > 0 && fileDiffLines && fileDiffLines.includes(startLine);
              const commentLine = isExactLine
                ? startLine
                : (startLine > 0 ? nearestDiffLine(fileDiffLines, startLine) : (fileDiffLines ? fileDiffLines[0] : null));

              if (!commentLine) continue;

              const locationNote = !isExactLine && startLine > 0
                ? `\n> :round_pushpin: _Actual location: **line ${startLine}** (nearest diff line shown here)_\n`
                : '';

              const body = [
                `**:warning: SpotBugs: ${shortMsg}**`,
                ``,
                longMsg && longMsg !== shortMsg ? `> ${longMsg}` : null,
                longMsg && longMsg !== shortMsg ? `` : null,
                locationNote || null,
                `| | |`,
                `|---|---|`,
                `| **Priority** | ${priorityLabel} |`,
                `| **Category** | ${category} |`,
                `| **Bug Type** | [\`${type}\`](${docsUrl}) |`,
              ].filter(l => l !== null).join('\n');

              comments.push({ path: repoPath, line: commentLine, body });
            }

            if (comments.length === 0) {
              core.info('No inline comments to post.');
              return;
            }

            core.info(`Posting ${comments.length} inline review comment(s)`);

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: context.payload.pull_request.head.sha,
                event: 'COMMENT',
                body: ':mag: **SpotBugs** found issues in the changed files. See inline comments below.',
                comments: comments.map(c => ({ path: c.path, line: c.line, body: c.body })),
              });
            } catch (e) {
              core.warning(`Failed to create batch review: ${e.message}`);
              for (const c of comments) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    commit_id: context.payload.pull_request.head.sha,
                    path: c.path,
                    line: c.line,
                    body: c.body,
                  });
                } catch (innerErr) {
                  core.warning(`Could not comment on ${c.path}:${c.line}: ${innerErr.message}`);
                }
              }
            }

  osee_server_container_build:
    runs-on: ubuntu-latest
    needs: [validate_osee_build_linux, check_changes]

    steps:
      - name: init_osee_server_container_build
        shell: bash
        run: echo " Checking for docker build and push "

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/checkout@v4

      - name: create image
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/osee-server-container-build
        with:
          IMAGE_NAME: osee-server
          SERVER_PATH: ${{env.SERVER_PATH}}
          IMAGE_DIRECTORY: ${{env.IMAGE_DIRECTORY}}
  web_e2e:
    runs-on: ubuntu-latest
    # continue-on-error: true
    needs:
      [
        osee_server_container_build,
        check_changes,
        generate_potential_docker_ref,
      ]
    steps:
      - run: echo "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/checkout@v4

      - name: setup environment files
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Set Up Docker Buildx
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: setup environment
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        shell: bash
        run: docker compose up -d --wait

      - name: web setup
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/web-setup

      - name: Run tests
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        run: pnpm -r run playwright

      - name: Write report to gha comment
        if: ${{ (needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true') && !cancelled() }}
        uses: daun/playwright-report-summary@v3
        with:
          report-file: web/apps/osee/results/results.json

      - name: cleanup
        if: ${{ (needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true') && !cancelled()  }}
        shell: bash
        run: docker compose down

  rules_osee_e2e:
    if: false # disabling the PLE tool tests until its error is resolved
    runs-on: ubuntu-latest
    # continue-on-error: true
    env:
      USERNAME: "3333"
    needs:
      [
        osee_server_container_build,
        check_changes,
        generate_potential_docker_ref,
      ]
    steps:
      - run: echo "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: actions/checkout@v4

      - name: create artifact ref
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: setup environment files
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Set Up Docker Buildx
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: setup environment
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        shell: bash
        run: docker compose up -d --wait

      - name: bazel setup
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: check username
        run: echo $USERNAME

      - name: setup db
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: ./tools/support/setup-db.sh

      - name: build
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: bazel build //rules_osee_examples/...:all --platforms=@my_product_line//platforms/configurations:Product_A_host

      - name: test
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
