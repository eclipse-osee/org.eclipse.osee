name: OSEE Build Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  ARTIFACT_PATH: "plugins/org.eclipse.osee.server.p2/target/org.eclipse.osee.server.runtime.zip"
  SERVER_PATH: "osee_server"
  SERVER_ZIP: "org.eclipse.osee.server.runtime.zip"
  IMAGE_DIRECTORY: ".github/docker/osee-server/Dockerfile"

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      angular_changed: ${{ steps.angular_changes.outputs.any_modified }}
      java_changed: ${{ steps.java_changes.outputs.any_modified }}
      rust_changed: ${{ steps.rust_changes.outputs.any_modified }}
      rules_osee_changed: ${{ steps.rules_osee_changes.outputs.any_modified }}
      postgres_schema_changed: ${{ steps.postgres_schema_changes.outputs.any_modified }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check For Angular Changes
        id: angular_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            web/**/*
            **/package.json
            pnpm-lock.yaml

      - name: Check For Java Changes
        id: java_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            plugins/**/*
            features/**/*
            .github/docker/osee-server/*

      - name: Check For Rust Changes
        id: rust_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.rs
            **/Cargo.toml
            Cargo.lock

      - name: Check For rules_osee Changes
        id: rules_osee_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            rules_osee/**/*
            rules_osee_examples/**/*
            WORKSPACE
            MODULE.bazel
            MODULE.bazel.lock
            BUILD
            **/.bazelrc
            **/.bazelversion

      - name: Check For postgres schema Changes
        id: postgres_schema_changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            .github/docker/utility/osee-postgres/**/*

      - name: Show Outputs
        run: |
          echo "# Changed Files: " >> $GITHUB_STEP_SUMMARY
          echo "## Angular Changed: ${{ steps.angular_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Java Changed: ${{ steps.java_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Rust Changed: ${{ steps.rust_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Rules_Osee Changed: ${{ steps.rules_osee_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Postgres schema Changed: ${{ steps.postgres_schema_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY

  generate_potential_docker_ref:
    runs-on: ubuntu-latest
    needs: check_changes
    outputs:
      osee_server_latest_ref: ${{ steps.osee_server_latest_ref.outputs.osee_server_latest_ref }}
      osee_server_main_ref: ${{ steps.osee_server_main_ref.outputs.osee_server_main_ref }}
      osee_server_image_ref: ${{ steps.osee_server_image_ref.outputs.osee_server_image_ref}}
      osee_postgres_latest_ref: ${{ steps.osee_postgres_latest_ref.outputs.osee_postgres_latest_ref }}
      osee_postgres_main_ref: ${{ steps.osee_postgres_main_ref.outputs.osee_postgres_main_ref }}
      osee_postgres_image_ref: ${{ steps.osee_postgres_image_ref.outputs.osee_postgres_image_ref}}
      compose_file_ref: compose-file${{ steps.artifact_ref.outputs.artifact_current_ref }}
    steps:
      - uses: actions/checkout@v4

      - id: docker_ref
        uses: ./.github/actions/docker-current-ref

      - name: osee_server_main_ref
        id: osee_server_main_ref
        shell: bash
        run: echo "osee_server_main_ref=ghcr.io/${{ github.repository }}/osee-server:latest" >> "$GITHUB_OUTPUT"

      - name: osee_server_latest_ref
        id: osee_server_latest_ref
        shell: bash
        run: echo "osee_server_latest_ref=ghcr.io/${{ github.repository }}/osee-server${{steps.docker_ref.outputs.docker_current_ref}}:latest" >> "$GITHUB_OUTPUT"

      - id: osee_server_image_ref
        shell: bash
        run: |
          if [[ "${{needs.check_changes.outputs.java_changed}}" == "true" ]]; then
            echo "osee_server_image_ref=${{ steps.osee_server_latest_ref.outputs.osee_server_latest_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "osee_server_image_ref=${{ steps.osee_server_main_ref.outputs.osee_server_main_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: osee_postgres_main_ref
        id: osee_postgres_main_ref
        shell: bash
        run: echo "osee_postgres_main_ref=ghcr.io/${{ github.repository }}/osee-postgres:latest" >> "$GITHUB_OUTPUT"

      - name: osee_postgres_latest_ref
        id: osee_postgres_latest_ref
        shell: bash
        run: echo "osee_postgres_latest_ref=ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:latest" >> "$GITHUB_OUTPUT"

      - id: osee_postgres_image_ref
        shell: bash
        run: |
          if [[ "${{needs.check_changes.outputs.postgres_schema_changed}}" == "true" ]]; then
            echo "osee_postgres_image_ref=${{ steps.osee_postgres_latest_ref.outputs.osee_postgres_latest_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "osee_postgres_image_ref=${{ steps.osee_postgres_main_ref.outputs.osee_postgres_main_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: create artifact ref
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: setup environment files
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ steps.osee_postgres_image_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ steps.osee_server_image_ref.outputs.osee_server_image_ref }}"

      - name: upload compose
        uses: actions/upload-artifact@v4
        with:
          name: compose-file${{steps.artifact_ref.outputs.artifact_current_ref}}
          overwrite: true
          path: docker-compose.yml

  build_osee_postgres:
    runs-on: ubuntu-latest
    needs: [check_changes, generate_potential_docker_ref]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: create docker ref
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        id: docker_ref
        uses: ./.github/actions/docker-current-ref

      - name: Set Up Docker Buildx
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Get Current Timestamp
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        id: date
        run: echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build And Push Docker Image
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/utility/osee-postgres/Dockerfile
          build-args: |
            IMAGE_DIRECTORY=.github/docker/utility/osee-postgres
          push: "true"
          tags: |
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:${{ steps.date.outputs.timestamp }}
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:latest

  validate_osee_build_linux:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [check_changes, generate_potential_docker_ref, build_osee_postgres]
    container:
      image: ghcr.io/eclipse-osee/org.eclipse.osee/maven-node:20260210184531
    services:
      postgres:
        image: ${{ needs.check_changes.outputs.java_changed == 'true' && needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref || '' }}
        env:
          POSTGRES_PASSWORD: osee
          POSTGRES_USER: osee
          POSTGRES_DB: osee
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build OSEE Binaries
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/build-osee-binary
        with:
          SKIP_ANGULAR_TESTS: "true"
          ANGULAR_BUILD_TYPE: "forced_sso_java_release"

      - name: create artifact ref
        id: artifact_ref
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/artifact-current-ref

      - name: Archive Binaries
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: osee-server${{steps.artifact_ref.outputs.artifact_current_ref}}-binaries
          overwrite: true
          path: ${{ env.ARTIFACT_PATH }}

      - name: Archive Compiled Classes For SpotBugs
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: osee-compiled-classes${{steps.artifact_ref.outputs.artifact_current_ref}}
          overwrite: true
          retention-days: 1
          path: plugins/**/target/classes/**/*.class

  spotbugs_analysis:
    runs-on: ubuntu-latest
    needs: [validate_osee_build_linux, check_changes]
    if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
    container:
      image: ghcr.io/eclipse-osee/org.eclipse.osee/alpine-spotbugs:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: create artifact ref
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: Download Compiled Classes
        uses: actions/download-artifact@v4
        with:
          name: osee-compiled-classes${{steps.artifact_ref.outputs.artifact_current_ref}}
          path: compiled-classes

      - name: Run SpotBugs Analysis (HTML)
        run: |
          /root/spotbugs/spotbugs-4.9.1/bin/spotbugs \
            -textui \
            -html:fancy-hist.xsl \
            -output spotbugs-report.html \
            -auxclasspathFromInput \
            -onlyAnalyze "org.eclipse.osee.-" \
            -nested:false \
            compiled-classes/

      - name: Run SpotBugs Analysis (XML)
        run: |
          /root/spotbugs/spotbugs-4.9.1/bin/spotbugs \
            -textui \
            -xml:withMessages \
            -output spotbugs-report.xml \
            -auxclasspathFromInput \
            -onlyAnalyze "org.eclipse.osee.-" \
            -nested:false \
            compiled-classes/

      - name: Upload SpotBugs Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            spotbugs-report.html
            spotbugs-report.xml

      - name: Get Changed Files in PR
        if: always()
        id: changed_files
        uses: actions/github-script@v7
        with:
          script: |
            const files = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
                page: page,
              });
              if (data.length === 0) break;
              for (const f of data) {
                files.push(f.filename);
              }
              page++;
            }
            const fs = require('fs');
            fs.writeFileSync('changed-files.txt', files.join('\n') + '\n');
            core.info(`Found ${files.length} changed files in PR`);

      - name: Generate Markdown from SpotBugs XML
        if: always()
        shell: bash
        run: |
          COMMENT_FILE="spotbugs-comment.md"
          CHANGED_BUGS_FILE=$(mktemp)
          OTHER_BUGS_FILE=$(mktemp)

          if [ ! -f spotbugs-report.xml ]; then
            echo "## :x: SpotBugs Analysis" > "$COMMENT_FILE"
            echo "SpotBugs report was not generated." >> "$COMMENT_FILE"
            exit 0
          fi

          BUG_COUNT=$(grep -c '<BugInstance' spotbugs-report.xml 2>/dev/null || echo "0")

          if [ "$BUG_COUNT" -eq 0 ]; then
            echo "## :white_check_mark: SpotBugs Analysis — No Bugs Found" > "$COMMENT_FILE"
            echo "" >> "$COMMENT_FILE"
            echo "SpotBugs analyzed the \`org.eclipse.osee\` packages and found no issues." >> "$COMMENT_FILE"
            exit 0
          fi

          # Build a lookup of source paths from changed files.
          # PR paths look like: plugins/org.eclipse.osee.foo/src/org/eclipse/osee/foo/Bar.java
          # SpotBugs sourcepath looks like: org/eclipse/osee/foo/Bar.java
          # SpotBugs classname looks like: org.eclipse.osee.foo.Bar
          # We extract the relative java source path from each changed file and also
          # derive the dotted class name so we can match on either.
          declare -A CHANGED_SOURCES
          declare -A CHANGED_CLASSES
          if [ -f changed-files.txt ]; then
            while IFS= read -r fpath; do
              # Only care about .java files
              case "$fpath" in
                *.java) ;;
                *) continue ;;
              esac
              # Extract the portion after /src/ (or /src-gen/) to get the source-relative path
              SRC_REL=""
              if echo "$fpath" | grep -q '/src/'; then
                SRC_REL=$(echo "$fpath" | sed 's|.*/src/||')
              elif echo "$fpath" | grep -q '/src-gen/'; then
                SRC_REL=$(echo "$fpath" | sed 's|.*/src-gen/||')
              fi
              if [ -n "$SRC_REL" ]; then
                CHANGED_SOURCES["$SRC_REL"]=1
                # Derive dotted class name: org/eclipse/osee/Foo.java -> org.eclipse.osee.Foo
                DOTTED=$(echo "$SRC_REL" | sed 's|/|.|g; s|\.java$||')
                CHANGED_CLASSES["$DOTTED"]=1
              fi
            done < changed-files.txt
          fi

          # Parse bugs into two buckets: changed-file bugs and other bugs
          CHANGED_IDX=0
          OTHER_IDX=0
          IN_BUG=false
          BUG_BLOCK=""

          while IFS= read -r line; do
            if echo "$line" | grep -q '<BugInstance '; then
              IN_BUG=true
              BUG_BLOCK=""
            fi

            if $IN_BUG; then
              BUG_BLOCK="${BUG_BLOCK}${line}"$'\n'
            fi

            if echo "$line" | grep -q '</BugInstance>'; then
              IN_BUG=false

              CATEGORY=$(echo "$BUG_BLOCK" | sed -n 's/.*category="\([^"]*\)".*/\1/p' | head -1)
              PRIORITY=$(echo "$BUG_BLOCK" | sed -n 's/.*<BugInstance.*priority="\([^"]*\)".*/\1/p' | head -1)
              TYPE=$(echo "$BUG_BLOCK" | sed -n 's/.*<BugInstance.*type="\([^"]*\)".*/\1/p' | head -1)
              CLASSNAME=$(echo "$BUG_BLOCK" | sed -n 's/.*classname="\([^"]*\)".*/\1/p' | head -1)
              MSG=$(echo "$BUG_BLOCK" | sed -n 's/.*<ShortMessage>\([^<]*\)<\/ShortMessage>.*/\1/p' | head -1)
              SOURCEPATH=$(echo "$BUG_BLOCK" | sed -n 's/.*sourcepath="\([^"]*\)".*/\1/p' | head -1)

              # Map priority to label
              case "$PRIORITY" in
                1) PLABEL=":red_circle: High" ;;
                2) PLABEL=":orange_circle: Medium" ;;
                3) PLABEL=":yellow_circle: Low" ;;
                *) PLABEL="$PRIORITY" ;;
              esac

              # Escape pipes in message
              MSG=$(echo "$MSG" | sed 's/|/\\|/g')

              # Determine if this bug is in a changed file
              IS_CHANGED=false
              if [ -n "$SOURCEPATH" ] && [ -n "${CHANGED_SOURCES[$SOURCEPATH]+x}" ]; then
                IS_CHANGED=true
              elif [ -n "$CLASSNAME" ] && [ -n "${CHANGED_CLASSES[$CLASSNAME]+x}" ]; then
                IS_CHANGED=true
              fi

              if $IS_CHANGED; then
                CHANGED_IDX=$((CHANGED_IDX + 1))
                echo "| ${CHANGED_IDX} | ${CATEGORY} | ${PLABEL} | ${TYPE} | \`${CLASSNAME}\` | ${MSG} |" >> "$CHANGED_BUGS_FILE"
              else
                OTHER_IDX=$((OTHER_IDX + 1))
                echo "| ${OTHER_IDX} | ${CATEGORY} | ${PLABEL} | ${TYPE} | \`${CLASSNAME}\` | ${MSG} |" >> "$OTHER_BUGS_FILE"
              fi
            fi
          done < spotbugs-report.xml

          # Build the comment
          {
            echo "## :mag: SpotBugs Analysis — ${BUG_COUNT} Bug(s) Found"
            echo ""
          } > "$COMMENT_FILE"

          # Section 1: Bugs in changed files (shown expanded)
          if [ "$CHANGED_IDX" -gt 0 ]; then
            {
              echo "### :pushpin: Bugs in Changed Files — ${CHANGED_IDX} issue(s)"
              echo ""
              echo "| # | Category | Priority | Bug Type | Class | Message |"
              echo "|---|----------|----------|----------|-------|---------|"
            } >> "$COMMENT_FILE"
            cat "$CHANGED_BUGS_FILE" >> "$COMMENT_FILE"
            echo "" >> "$COMMENT_FILE"
          else
            {
              echo "### :pushpin: Bugs in Changed Files"
              echo ""
              echo ":white_check_mark: No SpotBugs issues found in files changed by this PR."
              echo ""
            } >> "$COMMENT_FILE"
          fi

          # Section 2: All other bugs (collapsed)
          if [ "$OTHER_IDX" -gt 0 ]; then
            {
              echo "### :file_folder: All Other Bugs — ${OTHER_IDX} issue(s)"
              echo ""
              echo "<details>"
              echo "<summary>Click to expand</summary>"
              echo ""
              echo "| # | Category | Priority | Bug Type | Class | Message |"
              echo "|---|----------|----------|----------|-------|---------|"
            } >> "$COMMENT_FILE"
            cat "$OTHER_BUGS_FILE" >> "$COMMENT_FILE"
            {
              echo ""
              echo "</details>"
            } >> "$COMMENT_FILE"
          fi

          {
            echo ""
            echo "> **Priority Legend:** :red_circle: High &nbsp; :orange_circle: Medium &nbsp; :yellow_circle: Low"
            echo ">"
            echo "> The full HTML report is available in the [build artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          } >> "$COMMENT_FILE"

          rm -f "$CHANGED_BUGS_FILE" "$OTHER_BUGS_FILE"

      - name: Post SpotBugs Summary To PR
        if: always()
        shell: bash
        run: |
          if [ -f spotbugs-comment.md ]; then
            cat spotbugs-comment.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post SpotBugs Comment To PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('spotbugs-comment.md', 'utf8');
            const marker = '<!-- spotbugs-analysis-comment -->';
            const fullBody = marker + '\n' + body;

            // Find and update existing comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

  osee_server_container_build:
    runs-on: ubuntu-latest
    needs: [validate_osee_build_linux, check_changes]

    steps:
      - name: init_osee_server_container_build
        shell: bash
        run: echo " Checking for docker build and push "

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/checkout@v4

      - name: create image
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/osee-server-container-build
        with:
          IMAGE_NAME: osee-server
          SERVER_PATH: ${{env.SERVER_PATH}}
          IMAGE_DIRECTORY: ${{env.IMAGE_DIRECTORY}}
  web_e2e:
    runs-on: ubuntu-latest
    # continue-on-error: true
    needs:
      [
        osee_server_container_build,
        check_changes,
        generate_potential_docker_ref,
      ]
    steps:
      - run: echo "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/checkout@v4

      - name: setup environment files
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Set Up Docker Buildx
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: setup environment
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        shell: bash
        run: docker compose up -d --wait

      - name: web setup
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/web-setup

      - name: Run tests
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        run: pnpm -r run playwright

      - name: Write report to gha comment
        if: ${{ (needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true') && !cancelled() }}
        uses: daun/playwright-report-summary@v3
        with:
          report-file: web/apps/osee/results/results.json

      - name: cleanup
        if: ${{ (needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true') && !cancelled()  }}
        shell: bash
        run: docker compose down

  rules_osee_e2e:
    if: false # disabling the PLE tool tests until its error is resolved
    runs-on: ubuntu-latest
    # continue-on-error: true
    env:
      USERNAME: "3333"
    needs:
      [
        osee_server_container_build,
        check_changes,
        generate_potential_docker_ref,
      ]
    steps:
      - run: echo "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: actions/checkout@v4

      - name: create artifact ref
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: setup environment files
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Set Up Docker Buildx
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: setup environment
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        shell: bash
        run: docker compose up -d --wait

      - name: bazel setup
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: check username
        run: echo $USERNAME

      - name: setup db
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: ./tools/support/setup-db.sh

      - name: build
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: bazel build //rules_osee_examples/...:all --platforms=@my_product_line//platforms/configurations:Product_A_host

      - name: test
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: bazel test //rules_osee_examples/...:all --platforms=@my_product_line//platforms/configurations:Product_A_host

