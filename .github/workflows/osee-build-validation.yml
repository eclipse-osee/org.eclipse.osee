name: OSEE Build Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  ARTIFACT_PATH: "plugins/org.eclipse.osee.server.p2/target/org.eclipse.osee.server.runtime.zip"
  SERVER_PATH: "osee_server"
  SERVER_ZIP: "org.eclipse.osee.server.runtime.zip"
  IMAGE_DIRECTORY: ".github/docker/osee-server/Dockerfile"

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      angular_changed: ${{ steps.angular_changes.outputs.any_modified }}
      java_changed: ${{ steps.java_changes.outputs.any_modified }}
      rust_changed: ${{ steps.rust_changes.outputs.any_modified }}
      rules_osee_changed: ${{ steps.rules_osee_changes.outputs.any_modified }}
      postgres_schema_changed: ${{ steps.postgres_schema_changes.outputs.any_modified }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Check For Angular Changes
        id: angular_changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            web/**/*
            **/package.json
            pnpm-lock.yaml

      - name: Check For Java Changes
        id: java_changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            plugins/**/*
            features/**/*
            .github/docker/osee-server/*

      - name: Check For Rust Changes
        id: rust_changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.rs
            **/Cargo.toml
            Cargo.lock

      - name: Check For rules_osee Changes
        id: rules_osee_changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            rules_osee/**/*
            rules_osee_examples/**/*
            WORKSPACE
            MODULE.bazel
            MODULE.bazel.lock
            BUILD
            **/.bazelrc
            **/.bazelversion

      - name: Check For postgres schema Changes
        id: postgres_schema_changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            .github/docker/utility/osee-postgres/**/*

      - name: Show Outputs
        run: |
          echo "# Changed Files: " >> $GITHUB_STEP_SUMMARY
          echo "## Angular Changed: ${{ steps.angular_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Java Changed: ${{ steps.java_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Rust Changed: ${{ steps.rust_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Rules_Osee Changed: ${{ steps.rules_osee_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "## Postgres schema Changed: ${{ steps.postgres_schema_changes.outputs.any_modified }}" >> $GITHUB_STEP_SUMMARY

  generate_potential_docker_ref:
    runs-on: ubuntu-latest
    needs: check_changes
    outputs:
      osee_server_latest_ref: ${{ steps.osee_server_latest_ref.outputs.osee_server_latest_ref }}
      osee_server_main_ref: ${{ steps.osee_server_main_ref.outputs.osee_server_main_ref }}
      osee_server_image_ref: ${{ steps.osee_server_image_ref.outputs.osee_server_image_ref}}
      osee_postgres_latest_ref: ${{ steps.osee_postgres_latest_ref.outputs.osee_postgres_latest_ref }}
      osee_postgres_main_ref: ${{ steps.osee_postgres_main_ref.outputs.osee_postgres_main_ref }}
      osee_postgres_image_ref: ${{ steps.osee_postgres_image_ref.outputs.osee_postgres_image_ref}}
      compose_file_ref: compose-file${{ steps.artifact_ref.outputs.artifact_current_ref }}
    steps:
      - uses: actions/checkout@v6

      - id: docker_ref
        uses: ./.github/actions/docker-current-ref

      - name: osee_server_main_ref
        id: osee_server_main_ref
        shell: bash
        run: echo "osee_server_main_ref=ghcr.io/${{ github.repository }}/osee-server:latest" >> "$GITHUB_OUTPUT"

      - name: osee_server_latest_ref
        id: osee_server_latest_ref
        shell: bash
        run: echo "osee_server_latest_ref=ghcr.io/${{ github.repository }}/osee-server${{steps.docker_ref.outputs.docker_current_ref}}:latest" >> "$GITHUB_OUTPUT"

      - id: osee_server_image_ref
        shell: bash
        run: |
          if [[ "${{needs.check_changes.outputs.java_changed}}" == "true" ]]; then
            echo "osee_server_image_ref=${{ steps.osee_server_latest_ref.outputs.osee_server_latest_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "osee_server_image_ref=${{ steps.osee_server_main_ref.outputs.osee_server_main_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: osee_postgres_main_ref
        id: osee_postgres_main_ref
        shell: bash
        run: echo "osee_postgres_main_ref=ghcr.io/${{ github.repository }}/osee-postgres:latest" >> "$GITHUB_OUTPUT"

      - name: osee_postgres_latest_ref
        id: osee_postgres_latest_ref
        shell: bash
        run: echo "osee_postgres_latest_ref=ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:latest" >> "$GITHUB_OUTPUT"

      - id: osee_postgres_image_ref
        shell: bash
        run: |
          if [[ "${{needs.check_changes.outputs.postgres_schema_changed}}" == "true" ]]; then
            echo "osee_postgres_image_ref=${{ steps.osee_postgres_latest_ref.outputs.osee_postgres_latest_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "osee_postgres_image_ref=${{ steps.osee_postgres_main_ref.outputs.osee_postgres_main_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: create artifact ref
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: setup environment files
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ steps.osee_postgres_image_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ steps.osee_server_image_ref.outputs.osee_server_image_ref }}"

      - name: upload compose
        uses: actions/upload-artifact@v7
        with:
          name: compose-file${{steps.artifact_ref.outputs.artifact_current_ref}}
          overwrite: true
          path: docker-compose.yml

  build_osee_postgres:
    runs-on: ubuntu-latest
    needs: [check_changes, generate_potential_docker_ref]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: create docker ref
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        id: docker_ref
        uses: ./.github/actions/docker-current-ref

      - name: Set Up Docker Buildx
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Get Current Timestamp
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        id: date
        run: echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build And Push Docker Image
        if: needs.check_changes.outputs.postgres_schema_changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/utility/osee-postgres/Dockerfile
          build-args: |
            IMAGE_DIRECTORY=.github/docker/utility/osee-postgres
          push: "true"
          tags: |
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:${{ steps.date.outputs.timestamp }}
            ghcr.io/${{ github.repository }}/osee-postgres${{steps.docker_ref.outputs.docker_current_ref}}:latest

  validate_osee_build_linux:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [check_changes, generate_potential_docker_ref, build_osee_postgres]
    container:
      image: ghcr.io/eclipse-osee/org.eclipse.osee/maven-node:20260210184531
    services:
      postgres:
        image: ${{ needs.check_changes.outputs.java_changed == 'true' && needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref || '' }}
        env:
          POSTGRES_PASSWORD: osee
          POSTGRES_USER: osee
          POSTGRES_DB: osee
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build OSEE Binaries
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/build-osee-binary
        with:
          SKIP_ANGULAR_TESTS: "true"
          ANGULAR_BUILD_TYPE: "forced_sso_java_release"

      - name: create artifact ref
        id: artifact_ref
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/artifact-current-ref

      - name: Archive Binaries
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: osee-server${{steps.artifact_ref.outputs.artifact_current_ref}}-binaries
          overwrite: true
          path: ${{ env.ARTIFACT_PATH }}

      - name: Archive Compiled Classes For SpotBugs
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: osee-compiled-classes${{steps.artifact_ref.outputs.artifact_current_ref}}
          overwrite: true
          retention-days: 1
          path: plugins/**/target/classes/**/*.class

  spotbugs_analysis:
    runs-on: ubuntu-latest
    needs: [validate_osee_build_linux, check_changes]
    if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
    container:
      image: ghcr.io/eclipse-osee/org.eclipse.osee/alpine-spotbugs:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: create artifact ref
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: Download Compiled Classes
        uses: actions/download-artifact@v4
        with:
          name: osee-compiled-classes${{steps.artifact_ref.outputs.artifact_current_ref}}
          path: compiled-classes

      - name: Run SpotBugs Full Analysis
        run: |
          /root/spotbugs/current/bin/spotbugs -textui \
            -xml:withMessages -output spotbugs-report-full.xml \
            -auxclasspathFromInput -onlyAnalyze "org.eclipse.osee.-" \
            -nested:false compiled-classes/

          /root/spotbugs/current/bin/spotbugs -textui \
            -html:fancy-hist.xsl -output spotbugs-report-full.html \
            -auxclasspathFromInput -onlyAnalyze "org.eclipse.osee.-" \
            -nested:false compiled-classes/

      - name: Run Scoped Analysis and Post Results
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPOTBUGS_BIN: /root/spotbugs/current/bin/spotbugs
        shell: bash
        run: |
          set -uo pipefail

          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          API="https://api.github.com"
          PULL_NUMBER=$(grep -o '"number"[[:space:]]*:[[:space:]]*[0-9]*' "$GITHUB_EVENT_PATH" | head -1 | grep -o '[0-9]*')
          HEAD_SHA=$(grep -o '"sha"[[:space:]]*:[[:space:]]*"[^"]*"' "$GITHUB_EVENT_PATH" | head -1 | sed 's/.*"sha"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')

          if [ -z "$PULL_NUMBER" ]; then
            echo "Not a pull request event — skipping."
            exit 0
          fi
          echo "PR #${PULL_NUMBER} HEAD ${HEAD_SHA}"

          # --- Get changed Java files ---
          CHANGED_FILES=""
          page=1
          while true; do
            batch=$(curl -fsSL \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API}/repos/${OWNER}/${REPO}/pulls/${PULL_NUMBER}/files?per_page=100&page=${page}")
            filenames=$(echo "$batch" | grep -o '"filename"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/"filename"[[:space:]]*:[[:space:]]*"//;s/"$//')
            [ -z "$filenames" ] && break
            CHANGED_FILES="${CHANGED_FILES}${filenames}"$'\n'
            count=$(echo "$filenames" | wc -l)
            [ "$count" -lt 100 ] && break
            page=$((page + 1))
          done

          # --- Build class list ---
          CLASSES=""
          declare -A SRC_TO_REPO
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in *.java) ;; *) continue ;; esac
            for marker in "/src/" "/src-gen/"; do
              rest="${file#*${marker}}"
              if [ "$rest" != "$file" ]; then
                cls=$(echo "$rest" | tr '/' '.' | sed 's/\.java$//')
                [ -n "$CLASSES" ] && CLASSES="${CLASSES},${cls}" || CLASSES="$cls"
                SRC_TO_REPO["$rest"]="$file"
                break
              fi
            done
          done <<< "$CHANGED_FILES"

          # --- Run scoped SpotBugs ---
          if [ -n "$CLASSES" ]; then
            echo "Running SpotBugs on changed classes: $CLASSES"
            ${SPOTBUGS_BIN} -textui \
              -xml:withMessages -output spotbugs-report-changed.xml \
              -auxclasspathFromInput -onlyAnalyze "$CLASSES" \
              -nested:false compiled-classes/ || true
            ${SPOTBUGS_BIN} -textui \
              -html:fancy-hist.xsl -output spotbugs-report-changed.html \
              -auxclasspathFromInput -onlyAnalyze "$CLASSES" \
              -nested:false compiled-classes/ || true
          fi

          # --- Count bugs ---
          count_bugs() {
            [ ! -f "$1" ] && echo "-1" && return
            grep -o 'total_bugs="[0-9]*"' "$1" | head -1 | grep -o '[0-9]*' || echo "0"
          }
          FULL_COUNT=$(count_bugs "spotbugs-report-full.xml")

          # --- Parse changed bugs using awk ---
          CHANGED_BUGS=""
          if [ -f "spotbugs-report-changed.xml" ]; then
            CHANGED_BUGS=$(awk '
              /<BugInstance / {
                type=""; priority=""; category=""; sourcepath=""; method=""; msg=""; longmsg=""
                match($0, /type="[^"]*"/); type=substr($0, RSTART+6, RLENGTH-7)
                match($0, /priority="[^"]*"/); priority=substr($0, RSTART+10, RLENGTH-11)
                match($0, /category="[^"]*"/); category=substr($0, RSTART+10, RLENGTH-11)
                in_bug=1
              }
              in_bug && /<SourceLine / && sourcepath=="" {
                match($0, /sourcepath="[^"]*"/); sourcepath=substr($0, RSTART+12, RLENGTH-13)
              }
              in_bug && /<Method / && method=="" {
                match($0, /name="[^"]*"/); method=substr($0, RSTART+6, RLENGTH-7)
              }
              in_bug && /<ShortMessage>/ {
                gsub(/.*<ShortMessage>/, ""); gsub(/<\/ShortMessage>.*/, ""); msg=$0
              }
              in_bug && /<LongMessage>/ {
                gsub(/.*<LongMessage>/, ""); gsub(/<\/LongMessage>.*/, ""); longmsg=$0
              }
              in_bug && /<\/BugInstance>/ {
                printf "%s\t%s\t%s\t%s\t%s\t%s\t%s\n", type, priority, category, sourcepath, method, msg, longmsg
                in_bug=0
              }
            ' spotbugs-report-changed.xml)
          fi

          NUM_BUGS=0
          [ -n "$CHANGED_BUGS" ] && NUM_BUGS=$(echo "$CHANGED_BUGS" | wc -l)
          echo "Found ${NUM_BUGS} issue(s) in changed files"

          # --- Artifact URL ---
          RUN_URL="${GITHUB_SERVER_URL}/${OWNER}/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          ARTIFACT_URL="${RUN_URL}#artifacts"

          # --- Build PR comment body ---
          MARKER="<!-- spotbugs-analysis-comment -->"
          BODY="${MARKER}"$'\n'"## :beetle: SpotBugs Analysis"$'\n'

          if [ "$NUM_BUGS" -gt 0 ]; then
            BODY+=$'\n'"### :pushpin: Issues in Changed Files — ${NUM_BUGS} issue(s)"$'\n'
            BODY+=$'\n'"| File | Method | Priority | Message |"$'\n'
            BODY+="|------|--------|----------|---------|"$'\n'
            while IFS=$'\t' read -r btype bpriority bcategory bsourcepath bmethod bmessage blongmsg; do
              fname="${bsourcepath##*/}"
              [ -n "$fname" ] && fname="\`${fname}\`"
              mname=""
              [ -n "$bmethod" ] && mname="\`${bmethod}()\`"
              case "$bpriority" in
                1) plabel=":red_circle: High" ;;
                2) plabel=":orange_circle: Medium" ;;
                3) plabel=":yellow_circle: Low" ;;
                *) plabel="$bpriority" ;;
              esac
              msg="${bmessage//|/\\|}"
              BODY+="| ${fname} | ${mname} | ${plabel} | ${msg} |"$'\n'
            done <<< "$CHANGED_BUGS"
            BODY+=$'\n'
          else
            BODY+=$'\n'"### :pushpin: Changed Files"$'\n'
            BODY+="> :white_check_mark: No issues in files changed by this PR."$'\n'$'\n'
          fi

          if [ "$FULL_COUNT" -gt 0 ]; then
            BODY+="### :file_folder: Full Analysis"$'\n'
            BODY+="> :warning: **${FULL_COUNT}** total issue(s) across all \`org.eclipse.osee\` packages."$'\n'
          elif [ "$FULL_COUNT" -eq 0 ]; then
            BODY+="### :file_folder: Full Analysis"$'\n'
            BODY+="> :white_check_mark: No issues found."$'\n'
          else
            BODY+="> :x: SpotBugs report was not generated."$'\n'
          fi

          BODY+=$'\n'"[:arrow_down: Download the SpotBugs HTML reports](${ARTIFACT_URL})"

          # --- JSON escape helper ---
          json_escape() {
            printf '%s' "$1" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' -e 's/\t/\\t/g' | awk 'BEGIN{ORS="\\n"}{print}' | sed 's/\\n$//' | sed 's/^/"/;s/$/"/'
          }

          # --- Upsert PR comment ---
          ESCAPED_BODY=$(json_escape "$BODY")
          comments_json=$(curl -fsSL \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}/repos/${OWNER}/${REPO}/issues/${PULL_NUMBER}/comments")

          existing_id=$(echo "$comments_json" | grep -B5 "spotbugs-analysis-comment" | grep -o '"id"[[:space:]]*:[[:space:]]*[0-9]*' | head -1 | grep -o '[0-9]*')

          if [ -n "$existing_id" ]; then
            echo "Updating existing comment ${existing_id}"
            curl -fsSL -X PATCH \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "{\"body\":${ESCAPED_BODY}}" \
              "${API}/repos/${OWNER}/${REPO}/issues/comments/${existing_id}" > /dev/null
          else
            echo "Creating new PR comment"
            curl -fsSL -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "{\"body\":${ESCAPED_BODY}}" \
              "${API}/repos/${OWNER}/${REPO}/issues/${PULL_NUMBER}/comments" > /dev/null
          fi

          # --- File-level review comments ---
          if [ "$NUM_BUGS" -eq 0 ]; then exit 0; fi

          REVIEW_BODY=""
          declare -A FILE_COMMENTS
          while IFS=$'\t' read -r btype bpriority bcategory bsourcepath bmethod bmessage blongmsg; do
            repo_path="${SRC_TO_REPO[$bsourcepath]:-}"
            [ -z "$repo_path" ] && continue
            fname="${repo_path##*/}"
            case "$bpriority" in
              1) plabel=":red_circle: High" ;;
              2) plabel=":orange_circle: Medium" ;;
              3) plabel=":yellow_circle: Low" ;;
              *) plabel="$bpriority" ;;
            esac
            mname="_unknown_"
            [ -n "$bmethod" ] && mname="\`${bmethod}()\`"
            desc="$blongmsg"
            [ -z "$desc" ] || [ "$desc" = "$bmessage" ] && desc="$bmessage"
            [ -z "$desc" ] && desc="$btype"
            docs_url="https://spotbugs.readthedocs.io/en/stable/bugDescriptions.html#$(echo "$btype" | tr '[:upper:]' '[:lower:]')"

            entry=$'\n'"**${desc}**"$'\n'$'\n'"${plabel} \\&nbsp;\\&nbsp; **Method:** ${mname} \\&nbsp;\\&nbsp; **Type:** [\`${btype}\`](${docs_url})"$'\n'
            FILE_COMMENTS["$repo_path"]+="$entry"
          done <<< "$CHANGED_BUGS"

          COMMENTS_JSON="["
          first=true
          for repo_path in "${!FILE_COMMENTS[@]}"; do
            fname="${repo_path##*/}"
            num=$(echo "${FILE_COMMENTS[$repo_path]}" | grep -c '^\*\*' || true)
            s="s"; [ "$num" -eq 1 ] && s=""
            header="## :beetle: SpotBugs — ${num} issue${s} in \`${fname}\`"
            full_body="${header}${FILE_COMMENTS[$repo_path]}"
            escaped_comment=$(json_escape "$full_body")
            escaped_path=$(json_escape "$repo_path")
            [ "$first" = true ] && first=false || COMMENTS_JSON+=","
            COMMENTS_JSON+="{\"path\":${escaped_path},\"body\":${escaped_comment},\"subject_type\":\"file\"}"
          done
          COMMENTS_JSON+="]"

          echo "Posting file-level comments on ${#FILE_COMMENTS[@]} file(s)"
          REVIEW_ESCAPED=$(json_escape ":beetle: **SpotBugs** found issues in changed files.")
          HEAD_ESCAPED=$(json_escape "$HEAD_SHA")

          curl -fsSL -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "{\"commit_id\":${HEAD_ESCAPED},\"event\":\"COMMENT\",\"body\":${REVIEW_ESCAPED},\"comments\":${COMMENTS_JSON}}" \
            "${API}/repos/${OWNER}/${REPO}/pulls/${PULL_NUMBER}/reviews" > /dev/null 2>&1 || \
          echo "Batch review post failed — skipping file comments"

          echo "SpotBugs analysis complete."

      - name: Upload SpotBugs Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            spotbugs-report-full.html
            spotbugs-report-changed.html

  osee_server_container_build:
    runs-on: ubuntu-latest
    needs: [validate_osee_build_linux, check_changes]

    steps:
      - name: init_osee_server_container_build
        shell: bash
        run: echo " Checking for docker build and push "

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/checkout@v6

      - name: create image
        if: ${{ needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/osee-server-container-build
        with:
          IMAGE_NAME: osee-server
          SERVER_PATH: ${{env.SERVER_PATH}}
          IMAGE_DIRECTORY: ${{env.IMAGE_DIRECTORY}}
  web_e2e:
    runs-on: ubuntu-latest
    # continue-on-error: true
    needs:
      [
        osee_server_container_build,
        check_changes,
        generate_potential_docker_ref,
      ]
    steps:
      - run: echo "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: actions/checkout@v6

      - name: setup environment files
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Set Up Docker Buildx
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: setup environment
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        shell: bash
        run: docker compose up -d --wait

      - name: web setup
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        uses: ./.github/actions/web-setup

      - name: Run tests
        if: ${{ needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' }}
        run: pnpm -r run playwright

      - name: Write report to gha comment
        if: ${{ (needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true') && !cancelled() }}
        uses: daun/playwright-report-summary@v3
        with:
          report-file: web/apps/osee/results/results.json

      - name: cleanup
        if: ${{ (needs.check_changes.outputs.angular_changed == 'true' || needs.check_changes.outputs.java_changed == 'true') && !cancelled()  }}
        shell: bash
        run: docker compose down

  rules_osee_e2e:
    if: false # disabling the PLE tool tests until its error is resolved
    runs-on: ubuntu-latest
    # continue-on-error: true
    env:
      USERNAME: "3333"
    needs:
      [
        osee_server_container_build,
        check_changes,
        generate_potential_docker_ref,
      ]
    steps:
      - run: echo "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Checkout Repository
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: actions/checkout@v6

      - name: create artifact ref
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        id: artifact_ref
        uses: ./.github/actions/artifact-current-ref

      - name: setup environment files
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        id: compose_file
        uses: ./.github/actions/generate-docker-compose
        with:
          postgres_image: "${{ needs.generate_potential_docker_ref.outputs.osee_postgres_image_ref }}"
          osee_image: "${{ needs.generate_potential_docker_ref.outputs.osee_server_image_ref }}"

      - name: Set Up Docker Buildx
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: setup environment
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        shell: bash
        run: docker compose up -d --wait

      - name: bazel setup
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: check username
        run: echo $USERNAME

      - name: setup db
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: ./tools/support/setup-db.sh

      - name: build
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
        run: bazel build //rules_osee_examples/...:all --platforms=@my_product_line//platforms/configurations:Product_A_host

      - name: test
        if: ${{ needs.check_changes.outputs.rust_changed == 'true' || needs.check_changes.outputs.java_changed == 'true' || needs.check_changes.outputs.rules_osee_changed == 'true' }}
